name: Deploy Zero-Dependency Grid Gallery

on:
  push:
    branches:
      - main
    paths:
      - 'photos/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Flat HTML Image Grid
        run: |
          mkdir -p dist
          
          # Copy your raw photo folder directly to the build destination
          cp -r photos dist/

          # Start writing the single-file index.html from scratch
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Photo Gallery</title>
              <style>
                  :root {
                      --bg-color: #0d0e11;
                      --card-bg: rgba(255, 255, 255, 0.03);
                      --border-color: rgba(255, 255, 255, 0.08);
                      --text-color: #f3f4f6;
                  }
                  
                  body {
                      background-color: var(--bg-color);
                      color: var(--text-color);
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                      margin: 0;
                      padding: 2rem;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                  }

                  h1 {
                      font-weight: 400;
                      letter-spacing: -0.05em;
                      margin-bottom: 2rem;
                      color: rgba(255, 255, 255, 0.9);
                  }

                  .grid-container {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                      gap: 1.5rem;
                      width: 100%;
                      max-width: 1200px;
                  }

                  .gallery-item {
                      background: var(--card-bg);
                      border: 1px solid var(--border-color);
                      border-radius: 8px;
                      overflow: hidden;
                      aspect-ratio: 1 / 1;
                      cursor: pointer;
                      transition: transform 0.2s ease, border-color 0.2s ease;
                  }

                  .gallery-item:hover {
                      transform: scale(1.02);
                      border-color: rgba(255, 255, 255, 0.2);
                  }

                  .gallery-item img {
                      width: 100%;
                      height: 100%;
                      object-fit: cover;
                      loading: lazy;
                  }

                  /* Lightbox overlay styling */
                  #lightbox {
                      display: none;
                      position: fixed;
                      top: 0;
                      left: 0;
                      width: 100%;
                      height: 100%;
                      background-color: rgba(10, 11, 14, 0.95);
                      backdrop-filter: blur(8px);
                      justify-content: center;
                      align-items: center;
                      z-index: 1000;
                  }

                  #lightbox img {
                      max-width: 90%;
                      max-height: 90%;
                      object-fit: contain;
                      border-radius: 4px;
                      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                  }
              </style>
          </head>
          <body>

              <h1>Gallery</h1>
              <div class="grid-container">
          EOF

          # Find images dynamically and format them into HTML element grid slots
          find dist/photos -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" -o -iname "*.gif" \) | sort | while read -r filepath; do
              # Get path relative to the dist directory for the web server links
              webpath="${filepath#dist/}"
              echo "Adding image: $webpath"
              echo "        <div class=\"gallery-item\" onclick=\"openLightbox('$webpath')\"><img src=\"$webpath\" alt=\"Photo\"></div>" >> dist/index.html
          done

          # Close out the file layout template and append lightbox interactive logic
          cat << 'EOF' >> dist/index.html
              </div>

              <div id="lightbox" onclick="closeLightbox()">
                  <img id="lightbox-img" src="" alt="Enlarged view">
              </div>

              <script>
                  function openLightbox(src) {
                      document.getElementById('lightbox-img').src = src;
                      document.getElementById('lightbox').style.display = 'flex';
                  }
                  function closeLightbox() {
                      document.getElementById('lightbox').style.display = 'none';
                  }
              </script>
          </body>
          </html>
          EOF

      - name: Setup GitHub Pages Deployment Context
        uses: actions/configure-pages@v5

      - name: Package Generated Web Root
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Push Static Site to Live Server
        id: deployment
        uses: actions/deploy-pages@v4
