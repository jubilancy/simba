name: Deploy Grid Gallery to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'photos/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Graphic Processing Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg graphicsmagick exiv2

      - name: Compile Photo Grid Gallery
        run: |
          # Install the generator locally
          npm install -g thumbsup
          
          # Create your asset output directory
          mkdir -p dist
          
          # Run the builder over your folder to create a fully responsive grid site
          thumbsup --input ./photos --output ./dist --theme cards --title "My Gallery"

      - name: Setup GitHub Pages Deployment Context
        uses: actions/configure-pages@v5

      - name: Package Static Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Push Site to Live Server
        id: deployment
        uses: actions/deploy-pages@v4
